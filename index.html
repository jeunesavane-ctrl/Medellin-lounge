<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Connexion — Medellin Lounge</title>
<link rel="stylesheet" href="shared.css">
<style>
  body { padding-top: 0; }

  .login-wrap {
    min-height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: clamp(24px,4vh,48px) 24px;
    background: #090709;
    background-image: radial-gradient(ellipse 65% 50% at 50% 44%, #120a08 0%, transparent 70%);
  }

  .login-card {
    width: 100%; max-width: 292px;
    display: flex; flex-direction: column; align-items: center;
  }

  .login-mark {
    width: clamp(46px,7.5vh,56px); height: clamp(46px,7.5vh,56px);
    border-radius: 13px;
    background: #160e0b;
    border: 1px solid rgba(201,110,72,.2);
    color: #e89872;
    font-weight: 800; font-size: clamp(15px,2.5vh,19px); letter-spacing: 1px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: clamp(18px,3vh,26px);
  }

  .login-name {
    font-size: clamp(18px,3vh,22px);
    font-weight: 600; letter-spacing: .2px;
    color: #f0ece6; margin-bottom: 4px;
  }
  .login-name span { color: #c96e48; font-weight: 400; }

  .login-city {
    font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; color: #5a5360;
    margin-bottom: clamp(28px,4.5vh,40px);
  }

  .pin-dots {
    display: flex; gap: 11px; align-items: center;
    height: 10px; margin-bottom: clamp(20px,3.5vh,32px);
  }
  .pin-dots .dot {
    width: 8px; height: 8px; border-radius: 50%;
    border: 1.5px solid #2a2534; background: transparent;
    transition: background .12s, border-color .12s;
  }
  .pin-dots .dot.on { background: #c96e48; border-color: #c96e48; }

  .keypad {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: clamp(8px,1.5vh,12px); width: 100%;
  }

  .key {
    aspect-ratio: 1;
    border-radius: 50%;
    background: #141118;
    border: 1px solid #211d28;
    color: #f0ece6;
    font-size: clamp(19px,3.2vh,24px); font-weight: 400;
    font-family: inherit; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-tap-highlight-color: transparent;
    transition: background .1s, transform .08s;
  }
  .key:hover { background: #1b1720; }
  .key:active { transform: scale(.9); background: #1b1720; }

  .key.fn {
    background: transparent; border-color: transparent;
    color: #5a5360; font-size: clamp(15px,2.6vh,20px);
  }

  .key.ok {
    background: transparent;
    border: 1.5px solid rgba(201,110,72,.4);
    color: #c96e48; font-size: clamp(16px,2.8vh,22px);
  }
  .key.ok:active { background: #c96e48; color: #f0ece6; border-color: #c96e48; }

  .key:disabled { opacity: .22; pointer-events: none; }

  .login-foot {
    margin-top: clamp(36px,5.5vh,52px);
    font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: #2e2b34;
    text-align: center;
  }
</style>
</head><body>
<div id="toast"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-mark">ML</div>
    <div class="login-name">Medellin <span>Lounge</span></div>
    <div class="login-city">Conakry</div>

    <div class="pin-dots" id="dots"></div>

    <div class="keypad" id="keypad">
      <button class="key" data-d="1">1</button>
      <button class="key" data-d="2">2</button>
      <button class="key" data-d="3">3</button>
      <button class="key" data-d="4">4</button>
      <button class="key" data-d="5">5</button>
      <button class="key" data-d="6">6</button>
      <button class="key" data-d="7">7</button>
      <button class="key" data-d="8">8</button>
      <button class="key" data-d="9">9</button>
      <button class="key fn" id="kClear">&#9003;</button>
      <button class="key" data-d="0">0</button>
      <button class="key ok" id="kOk">&#10003;</button>
    </div>
  </div>

  <div class="login-foot">Nexus Services &amp; Construction SARL</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="shared.js"></script>
<script>
  if (ML.getRole()) location.href = landingFor(ML.getRole());

  let pin = "";
  let busy = false;

  function landingFor(role) {
    return ({
      owner: "dashboard.html", manager: "dashboard.html", associe: "dashboard.html",
      staff: "saisie.html", caissier: "caisse.html", chicha: "chicha.html", achats: "achats.html",
    })[role] || "dashboard.html";
  }

  function renderDots() {
    const n = Math.max(pin.length, 4);
    let html = "";
    for (let i = 0; i < n; i++) html += `<div class="dot${i < pin.length ? " on" : ""}"></div>`;
    $("dots").innerHTML = html;
  }
  renderDots();

  function addDigit(d) {
    if (busy || pin.length >= 12) return;
    pin += d;
    renderDots();
  }
  function clearPin() { pin = ""; renderDots(); }

  async function validate() {
    if (busy) return;
    if (pin.length < 4) { toast("Code trop court", "ko"); return; }
    busy = true;
    $("kOk").disabled = true;
    try {
      const h = await sha256(pin);

      const { data: cfgRows, error: cErr } = await db
        .from("config").select("key,value")
        .in("key", ["pin_owner", "pin_manager", "owner_nom"]);
      if (cErr) throw cErr;
      const C = {};
      (cfgRows || []).forEach((r) => (C[r.key] = r.value));

      let role = null, extra = null;

      if (C.pin_owner && h === C.pin_owner) {
        role = "owner";
        extra = { nom: C.owner_nom || "Gestionnaire" };
      } else if (C.pin_manager && h === C.pin_manager) {
        role = "manager";
        extra = { nom: "Manager", acces: "secours" };
      } else {
        const { data: emp } = await db
          .from("employes").select("id,nom,prenom,role")
          .eq("pin_hash", h).not("actif", "is", false).limit(1);
        if (emp && emp.length) {
          const e = emp[0];
          role = e.role;
          extra = { nom: ((e.prenom ? e.prenom + " " : "") + e.nom).trim(), employe_id: e.id };
        } else {
          const { data: asso } = await db
            .from("associes").select("id,nom,prenom,pourcentage")
            .eq("pin_hash", h).not("actif", "is", false).limit(1);
          if (asso && asso.length) {
            const a = asso[0];
            role = "associe";
            extra = {
              nom: ((a.prenom ? a.prenom + " " : "") + a.nom).trim(),
              associe_id: a.id, pourcentage: a.pourcentage,
            };
          }
        }
      }

      if (!role) { toast("Code incorrect", "ko"); clearPin(); return; }

      ML.setSession(role, extra, { hOwner: C.pin_owner || null, hManager: C.pin_manager || null });
      await ML.logAction("Connexion " + role);
      location.href = landingFor(role);
    } catch (e) {
      console.error(e);
      toast("Erreur de connexion", "ko");
    } finally {
      busy = false;
      $("kOk").disabled = false;
    }
  }

  $("keypad").addEventListener("click", (ev) => {
    const k = ev.target.closest(".key");
    if (!k) return;
    if (k.dataset.d) addDigit(k.dataset.d);
  });
  $("kClear").addEventListener("click", clearPin);
  $("kOk").addEventListener("click", validate);

  document.addEventListener("keydown", (ev) => {
    if (ev.key >= "0" && ev.key <= "9") addDigit(ev.key);
    else if (ev.key === "Backspace") { pin = pin.slice(0, -1); renderDots(); }
    else if (ev.key === "Enter") validate();
  });
</script>
</body></html>
