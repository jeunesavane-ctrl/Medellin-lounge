<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnet — Medellin Lounge</title>
<meta name="theme-color" content="#090709">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23160e0b'/><rect x='.5' y='.5' width='63' height='63' rx='13.5' fill='none' stroke='%23c96e48' stroke-opacity='.4'/><text x='32' y='41' font-family='Arial,Helvetica,sans-serif' font-size='23' font-weight='800' fill='%23e89872' text-anchor='middle'>ML</text></svg>">
<link rel="stylesheet" href="shared.css">
<style>
  .datebar { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
  .datebar input[type=date] { flex:1; margin:0; }
  .navbtn {
    background:var(--surface-2); border:1px solid var(--line-2); color:var(--text);
    width:40px; height:40px; border-radius:var(--radius-sm); font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .navbtn:active { transform:scale(.94); }
  .today-link { font-size:12px; color:var(--blue-soft); text-decoration:underline; cursor:pointer; }

  .summary { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px; }
  .scard { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-sm); padding:12px 10px; text-align:center; }
  .scard .sv { font-size:15px; font-weight:700; letter-spacing:-.2px; }
  .scard .sl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin-top:3px; }
  .scard.net .sv { color:var(--gold); font-size:16px; }
  .scard.ventes .sv { color:var(--ok); }
  .scard.depenses .sv { color:var(--ko); }

  .form-row { display:flex; gap:8px; }
  .form-row input[type=text] { flex:2; min-width:0; margin:0; }
  .form-row input[type=number] { flex:1; min-width:0; margin:0; }
  .form-row .btn { width:auto; padding:0 18px; flex-shrink:0; }
  .btn-vente { background:var(--ok); color:#082e15; }
  .btn-depense { background:var(--ko); color:#3a0d0d; }

  .list { margin-top:14px; display:flex; flex-direction:column; gap:6px; }
  .erow {
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    padding:10px 12px; background:var(--surface-2); border:1px solid var(--line); border-radius:var(--radius-sm);
  }
  .erow .lbl { font-size:13.5px; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .erow .lbl .time { color:var(--muted); font-size:11px; margin-right:6px; }
  .erow .lbl .who { color:var(--muted); font-size:11px; margin-left:6px; }
  .erow .amt { font-weight:700; font-size:14px; white-space:nowrap; flex-shrink:0; }
  .erow.vente .amt { color:var(--ok); }
  .erow.depense .amt { color:var(--ko); }
  .erow .del {
    background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px;
    width:26px; height:26px; border-radius:6px; flex-shrink:0; line-height:1;
  }
  .erow .del:hover { background:rgba(224,84,84,.15); color:var(--ko); }

  .hist .hrow {
    display:flex; justify-content:space-between; align-items:center; padding:8px 0;
    border-bottom:1px solid var(--line); font-size:13px; cursor:pointer;
  }
  .hist .hrow:last-child { border-bottom:none; }
  .hist .hrow:hover .hd { color:var(--blue-soft); }
  .hist .hn.pos { color:var(--ok); } .hist .hn.neg { color:var(--ko); }

  .foot-actions { display:flex; gap:8px; margin-top:4px; }
  .foot-actions .btn { width:auto; flex:1; }
</style>
</head><body>
<div id="toast"></div>

<main>
  <div class="hero">
    <h1>Carnet</h1>
    <div class="hsub">Notes rapides ventes / dépenses — visible par toute l'équipe, en direct.</div>
  </div>

  <div class="datebar">
    <button class="navbtn" id="prevDay">‹</button>
    <input type="date" id="dateSel">
    <button class="navbtn" id="nextDay">›</button>
  </div>
  <div class="row between mb">
    <span></span>
    <span class="today-link" id="gotoToday" style="display:none">Revenir à aujourd'hui</span>
  </div>

  <div class="summary">
    <div class="scard ventes"><div class="sv" id="sVentes">—</div><div class="sl">Ventes</div></div>
    <div class="scard depenses"><div class="sv" id="sDepenses">—</div><div class="sl">Dépenses</div></div>
    <div class="scard net"><div class="sv" id="sNet">—</div><div class="sl">Net</div></div>
  </div>

  <div class="card">
    <h2 style="margin-top:0">Ajouter une vente</h2>
    <div class="form-row">
      <input type="text" id="vLabel" placeholder="ex : 2 chicha table 4">
      <input type="number" id="vMontant" placeholder="GNF" min="0" inputmode="numeric">
      <button class="btn btn-vente" id="addVente">+</button>
    </div>
  </div>

  <div class="card">
    <h2 style="margin-top:0">Ajouter une dépense</h2>
    <div class="form-row">
      <input type="text" id="dLabel" placeholder="ex : charbon, glace…">
      <input type="number" id="dMontant" placeholder="GNF" min="0" inputmode="numeric">
      <button class="btn btn-depense" id="addDepense">+</button>
    </div>
  </div>

  <div class="card">
    <h2 style="margin-top:0">Détail du jour</h2>
    <div class="list" id="list">Chargement…</div>
  </div>

  <div class="card">
    <h2 style="margin-top:0">Historique (7 derniers jours notés)</h2>
    <div class="hist" id="hist">Chargement…</div>
  </div>

  <div class="foot-actions">
    <button class="btn btn-ghost" id="exportBtn">Exporter en CSV</button>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="shared.js"></script>
<script>
  document.body.insertAdjacentHTML("afterbegin", HEADER_HTML);
  if (!initPage(["manager", "owner"])) throw new Error("non autorisé");

  const meName = ML.getExtra().nom || ML.getRole();
  let entries = [];
  let curDate = todayISO();
  let sub = null;

  function fmtTime(ts){ return new Date(ts).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}); }

  // Requête isolée : si la table carnet_entrees n'existe pas encore (migration
  // pas passée), la page reste utilisable sans planter — juste vide.
  async function loadAll(){
    try {
      const since = new Date(); since.setDate(since.getDate()-30);
      const { data, error } = await db.from("carnet_entrees").select("*")
        .gte("date", since.toISOString().slice(0,10)).order("created_at");
      if (error) throw error;
      entries = data || [];
    } catch(e) { console.error("carnet_entrees:", e); entries = []; toast("Migration carnet pas encore appliquée (Supabase)","ko"); }
    render();
  }

  function entriesForDate(d){ return entries.filter(e => e.date === d); }

  function render(){
    $("dateSel").value = curDate;
    $("gotoToday").style.display = curDate === todayISO() ? "none" : "inline";

    const rows = entriesForDate(curDate);
    const ventes = rows.filter(e=>e.type==="vente").reduce((a,e)=>a+e.montant,0);
    const depenses = rows.filter(e=>e.type==="depense").reduce((a,e)=>a+e.montant,0);
    const net = ventes - depenses;

    $("sVentes").textContent = gnf(ventes);
    $("sDepenses").textContent = gnf(depenses);
    $("sNet").textContent = gnf(net);
    $("sNet").style.color = net < 0 ? "var(--ko)" : "var(--gold)";

    const list = $("list");
    if (!rows.length){
      list.innerHTML = `<p class="muted">Rien noté pour le ${escHtml(frDate(curDate))}.</p>`;
    } else {
      list.innerHTML = rows.map(e => `
        <div class="erow ${e.type}" data-id="${escHtml(e.id)}">
          <div class="lbl"><span class="time">${fmtTime(e.created_at)}</span>${escHtml(e.label || (e.type==="vente"?"Vente":"Dépense"))}<span class="who">${escHtml(e.cree_par||"")}</span></div>
          <div class="amt">${e.type==="vente"?"+":"−"}${gnf(e.montant)}</div>
          <button class="del" data-id="${escHtml(e.id)}">✕</button>
        </div>`).join("");
    }
    renderHist();
  }

  function renderHist(){
    const dates = [...new Set(entries.map(e=>e.date))].sort((a,b)=>b.localeCompare(a)).slice(0,7);
    const el = $("hist");
    if (!dates.length){ el.innerHTML = `<p class="muted">Aucun historique pour l'instant.</p>`; return; }
    el.innerHTML = dates.map(d => {
      const rows = entriesForDate(d);
      const v = rows.filter(e=>e.type==="vente").reduce((a,e)=>a+e.montant,0);
      const dep = rows.filter(e=>e.type==="depense").reduce((a,e)=>a+e.montant,0);
      const n = v - dep;
      return `<div class="hrow" data-date="${escHtml(d)}">
        <span class="hd">${escHtml(frDate(d))}</span>
        <span class="hn ${n<0?"neg":"pos"}">${gnf(n)}</span>
      </div>`;
    }).join("");
  }

  async function addEntry(type, label, montant){
    if (!(montant > 0)) { toast("Montant invalide","ko"); return false; }
    const rec = { date: curDate, type, label: label.trim()||null, montant: Math.round(montant), cree_par: meName };
    const { data, error } = await db.from("carnet_entrees").insert(rec).select().single();
    if (error){ toast(error.code==="PGRST205" ? "Migration carnet pas encore appliquée (Supabase)" : "Erreur","ko"); return false; }
    entries.push(data);
    render();
    return true;
  }

  $("addVente").addEventListener("click", async () => {
    if (await addEntry("vente", $("vLabel").value, Number($("vMontant").value))){
      $("vLabel").value=""; $("vMontant").value=""; $("vLabel").focus();
      toast("Vente ajoutée","ok");
    }
  });
  $("addDepense").addEventListener("click", async () => {
    if (await addEntry("depense", $("dLabel").value, Number($("dMontant").value))){
      $("dLabel").value=""; $("dMontant").value=""; $("dLabel").focus();
      toast("Dépense ajoutée","ok");
    }
  });
  [$("vMontant"), $("dMontant")].forEach(el => el.addEventListener("keydown", ev => {
    if (ev.key === "Enter") ev.target.closest(".form-row").querySelector(".btn").click();
  }));

  $("list").addEventListener("click", async (ev) => {
    const btn = ev.target.closest(".del"); if (!btn) return;
    const id = btn.dataset.id;
    if (!confirm("Supprimer cette entrée ?")) return;
    const { error } = await db.from("carnet_entrees").delete().eq("id", id);
    if (error){ toast("Erreur","ko"); return; }
    entries = entries.filter(e => e.id !== id);
    render();
    toast("Supprimé","ok");
  });

  $("hist").addEventListener("click", ev => {
    const row = ev.target.closest(".hrow"); if (!row) return;
    curDate = row.dataset.date; render();
  });
  $("dateSel").addEventListener("change", () => { curDate = $("dateSel").value || todayISO(); render(); });
  $("prevDay").addEventListener("click", () => {
    const d = new Date(curDate+"T00:00:00"); d.setDate(d.getDate()-1);
    curDate = d.toISOString().slice(0,10); render();
  });
  $("nextDay").addEventListener("click", () => {
    const d = new Date(curDate+"T00:00:00"); d.setDate(d.getDate()+1);
    curDate = d.toISOString().slice(0,10); render();
  });
  $("gotoToday").addEventListener("click", () => { curDate = todayISO(); render(); });

  $("exportBtn").addEventListener("click", () => {
    if (!entries.length) { toast("Rien à exporter"); return; }
    const header = ["Date","Heure","Type","Libellé","Montant (GNF)","Ajouté par"];
    const sorted = [...entries].sort((a,b)=> a.date.localeCompare(b.date) || new Date(a.created_at)-new Date(b.created_at));
    const lines = sorted.map(e => [
      e.date, fmtTime(e.created_at), e.type==="vente"?"Vente":"Dépense", e.label||"", e.montant, e.cree_par||"",
    ]);
    const csv = [header, ...lines].map(l => l.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\r\n");
    const blob = new Blob(["﻿"+csv], { type:"text/csv;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "carnet_medellin_" + todayISO() + ".csv";
    a.click();
    URL.revokeObjectURL(a.href);
    toast("Export généré","ok");
  });

  function subscribe(){
    sub = db.channel("carnet")
      .on("postgres_changes",{event:"*",schema:"public",table:"carnet_entrees"}, async () => { await loadAll(); })
      .subscribe();
  }
  window.addEventListener("beforeunload", () => { if (sub) db.removeChannel(sub); });

  loadAll().then(subscribe);
</script>
</body></html>
