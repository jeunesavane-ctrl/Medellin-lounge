<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Achats — Medellin Lounge</title>
<link rel="stylesheet" href="shared.css">
<style>
  .ach { display:grid; grid-template-columns:1fr auto auto; gap:8px; align-items:center;
         padding:10px 0; border-bottom:1px solid var(--line); }
  .ach .d { font-size:12px; color:var(--muted); margin-top:2px; }
  .twoin { display:grid; grid-template-columns:1fr 1fr; gap:0 12px; }
  .lock-banner { background:rgba(232,85,78,.12); border:1px solid var(--ko); color:var(--ko);
                 padding:10px 14px; border-radius:10px; font-weight:600; margin-bottom:14px; }
</style>
</head><body>
<div id="toast"></div>

<main>
  <h1>Achats & dépenses</h1>
  <div class="ml-sub" id="sub"></div>
  <div id="lockBanner" class="lock-banner" style="display:none">🔒 Caisse clôturée — saisie fermée</div>

  <div class="card" id="formCard">
    <h2 style="margin-top:0">Nouvel achat</h2>

    <label>Produit catalogue <span class="muted" style="font-size:12px">(optionnel — met à jour le stock)</span></label>
    <select id="aProduit"><option value="">— Achat hors catalogue —</option></select>

    <label>Catégorie</label>
    <select id="aCat">
      <option value="">— Catégorie —</option>
      <option value="Boissons">Boissons</option>
      <option value="Chicha">Chicha</option>
      <option value="Charbon">Charbon</option>
      <option value="Nourriture">Nourriture</option>
      <option value="Entretien">Entretien</option>
      <option value="Transport">Transport</option>
      <option value="Perso">Perso</option>
      <option value="Divers">Divers</option>
    </select>

    <label>Désignation</label>
    <input id="aNom" type="text" placeholder="Ex : Carton de Coca">

    <!-- Champs chicha : boîtes + têtes/boîte -->
    <div id="chichaFields" style="display:none">
      <div class="twoin">
        <div><label>Nb de boîtes achetées</label><input id="aNbBoites" type="number" min="1" placeholder="Ex : 2"></div>
        <div><label>Têtes par boîte</label><input id="aTetoesParBoite" type="number" min="1" placeholder="Ex : 50"></div>
      </div>
      <div id="chichaCalc" style="font-size:13px;color:var(--gold);font-weight:700;margin:4px 0 8px"></div>
    </div>

    <!-- Quantité visible seulement hors-chicha -->
    <div id="qtyRow">
      <label>Quantité</label><input id="aQty" type="number" step="any" min="0" placeholder="0">
    </div>

    <!-- Prix : toujours visible — "par boîte" pour chicha, "unitaire" pour le reste -->
    <label id="puLabel">Prix unitaire (GNF)</label>
    <input id="aPU" type="number" min="0" placeholder="Optionnel">

    <label>Montant total (GNF)</label>
    <input id="aMontant" type="number" min="1" placeholder="0">

    <button class="btn" id="addAchat">Ajouter</button>
  </div>

  <div class="card">
    <div class="row between">
      <h2 style="margin:0">Achats du jour</h2>
      <b class="gold" id="total">0 GNF</b>
    </div>
    <div id="list" class="mt">Chargement…</div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="shared.js"></script>
<script>
  document.body.insertAdjacentHTML("afterbegin", HEADER_HTML);
  if (!initPage(["achats", "manager", "owner"])) throw new Error("non autorisé");

  const st = { session:null, achats:[], produits:[] };
  const locked = () => !st.session || st.session.statut !== "ouvert";

  async function ensureSession(){
    let { data, error } = await db.from("sessions_caisse").insert({ date: todayISO() }).select().single();
    if (error && error.code === "23505") {
      ({ data } = await db.from("sessions_caisse").select("*").eq("date", todayISO()).maybeSingle());
      if (!data) throw new Error("Session introuvable après conflit d'insertion");
    } else if (error) throw error;
    return data;
  }

  async function load(){
    st.session = await ensureSession();
    const { data:prods } = await db.from("produits").select("id,nom,type,prix_achat,stock_actuel,unite_vente").not("actif","is",false).order("type").order("nom");
    st.produits = prods || [];
    $("aProduit").innerHTML = `<option value="">— Achat hors catalogue —</option>`
      + st.produits.map(p=>`<option value="${escHtml(p.id)}" data-pa="${p.prix_achat||0}" data-type="${escHtml(p.type||"")}">${escHtml(p.nom)} (stock : ${p.stock_actuel||0})</option>`).join("");
    $("sub").textContent = frDate(todayISO()) + " · " + (locked() ? "caisse clôturée" : "caisse ouverte");
    $("lockBanner").style.display = locked() ? "" : "none";
    if (locked()) document.querySelectorAll("#formCard input, #formCard button, #formCard select").forEach(el=>el.disabled=true);
    await loadAchats();
  }

  function isChichaSelected(){
    const opt = $("aProduit").selectedOptions[0];
    return opt && opt.dataset.type === "chicha";
  }

  $("aProduit").addEventListener("change", ()=>{
    const opt = $("aProduit").selectedOptions[0];
    const chicha = opt && opt.dataset.type === "chicha";
    $("chichaFields").style.display = chicha ? "" : "none";
    $("qtyRow").style.display = chicha ? "none" : "";
    $("puLabel").textContent = chicha ? "Prix par boîte (GNF)" : "Prix unitaire (GNF)";
    $("aNbBoites").value = ""; $("aTetoesParBoite").value = "";
    $("chichaCalc").textContent = "";
    $("aQty").value = ""; $("aPU").value = "";
    if (!opt || !opt.value) return;
    $("aNom").value = opt.textContent.replace(/\s*\(stock.*\)$/,"").trim();
    autoMontant();
  });

  function updateChichaCalc(){
    const nb = Number($("aNbBoites").value);
    const tp = Number($("aTetoesParBoite").value);
    if (nb > 0 && tp > 0){
      const total = nb * tp;
      $("aQty").value = total;
      $("chichaCalc").textContent = `${nb} boîte${nb>1?"s":""} × ${tp} têtes = ${total} têtes`;
    } else {
      $("chichaCalc").textContent = "";
      $("aQty").value = "";
    }
    autoMontant();
  }
  $("aNbBoites").addEventListener("input", updateChichaCalc);
  $("aTetoesParBoite").addEventListener("input", updateChichaCalc);

  async function loadAchats(){
    const { data } = await db.from("achats_session").select("*").eq("session_id", st.session.id).order("created_at");
    st.achats = data || [];
    const tot = st.achats.reduce((a,x)=>a+(x.montant||0),0);
    $("total").textContent = gnf(tot);
    const el = $("list");
    if (!st.achats.length){ el.innerHTML = `<p class="muted">Aucun achat enregistré.</p>`; return; }
    el.innerHTML = st.achats.map(a=>`
      <div class="ach" data-id="${escHtml(a.id)}">
        <div>
          <div style="font-weight:600">${escHtml(a.produit_nom || a.categorie || "Achat")}${a.produit_id?` <span class="tag tag-ok" style="font-size:10px">Stock +${a.qty||0}</span>`:""}</div>
          <div class="d">${escHtml(a.categorie || "")}${a.qty?` · ${a.qty}${a.prix_unitaire?" × "+gnf(a.prix_unitaire):""}`:""}</div>
        </div>
        <b>${gnf(a.montant)}</b>
        ${locked() ? "" : `<button class="btn btn-sm btn-ghost a-del">✕</button>`}
      </div>`).join("");
  }

  // auto-calcul montant
  function autoMontant(){
    const pu = Number($("aPU").value);
    if (isChichaSelected()){
      const nb = Number($("aNbBoites").value);
      if (nb > 0 && pu > 0) $("aMontant").value = Math.round(nb * pu);
    } else {
      const q = Number($("aQty").value);
      if (q > 0 && pu > 0) $("aMontant").value = Math.round(q * pu);
    }
  }
  $("aQty").addEventListener("input", autoMontant);
  $("aPU").addEventListener("input", autoMontant);

  $("addAchat").addEventListener("click", async ()=>{
    if (locked()) return;
    const montant = Math.round(Number($("aMontant").value) || 0);
    if (!(montant > 0)){ toast("Montant invalide", "ko"); return; }
    const produitId = $("aProduit").value || null;
    const chicha = isChichaSelected();
    const nbBoites = chicha ? Number($("aNbBoites").value)||0 : 0;
    const tetesParBoite = chicha ? Number($("aTetoesParBoite").value)||0 : 0;
    const qty = chicha ? (nbBoites * tetesParBoite) || null : Number($("aQty").value) || null;
    if (chicha && (!nbBoites||!tetesParBoite)){ toast("Indique les boîtes et têtes/boîte","ko"); return; }
    const nomBase = $("aNom").value.trim() || null;
    const produit_nom = chicha && nbBoites && tetesParBoite
      ? `${nomBase||"Chicha"} (${nbBoites} boîte${nbBoites>1?"s":""} × ${tetesParBoite} têtes)`
      : nomBase;
    const rec = {
      session_id: st.session.id,
      produit_id: produitId,
      categorie: $("aCat").value.trim() || null,
      produit_nom,
      montant,
      qty,
      prix_unitaire: Math.round(Number($("aPU").value) || 0) || null,
    };
    const { error } = await db.from("achats_session").insert(rec);
    if (error){ toast("Erreur", "ko"); console.error(error); return; }
    // Incrémenter le stock si lié à un produit catalogue
    if (produitId && qty > 0){
      const prod = st.produits.find(p=>p.id===produitId);
      if (prod){
        await db.from("produits").update({ stock_actuel: (Number(prod.stock_actuel)||0) + qty }).eq("id", produitId);
        prod.stock_actuel = (Number(prod.stock_actuel)||0) + qty;
        await stockMvt(produitId, qty, "achat", `${rec.produit_nom||prod.nom} ×${qty} (achat)`);
      }
    }
    await ML.logAction("Achat "+gnf(montant)+(rec.produit_nom?" — "+rec.produit_nom:"")+(produitId&&qty?" · stock +"+qty:""));
    ["aCat","aNom","aQty","aPU","aMontant","aNbBoites","aTetoesParBoite"].forEach(id=>$(id).value="");
    $("aProduit").value = "";
    $("chichaFields").style.display = "none";
    $("qtyRow").style.display = "";
    $("chichaCalc").textContent = "";
    $("puLabel").textContent = "Prix unitaire (GNF)";
    toast("Achat ajouté" + (produitId&&qty?" · stock mis à jour":""), "ok");
    loadAchats();
  });

  $("list").addEventListener("click", async (ev)=>{
    if (!ev.target.closest(".a-del")) return;
    const row = ev.target.closest(".ach"); const id = row.dataset.id;
    if (!confirm("Supprimer cet achat ?")) return;
    const achat = st.achats.find(a=>a.id===id);
    const { error } = await db.from("achats_session").delete().eq("id", id);
    if (error){ toast("Erreur", "ko"); return; }
    // Décrémenter le stock si lié à un produit
    if (achat?.produit_id && achat?.qty > 0){
      const { data:cur } = await db.from("produits").select("stock_actuel").eq("id", achat.produit_id).maybeSingle();
      if (cur){
        await db.from("produits").update({ stock_actuel: Math.max(0,(cur.stock_actuel||0)-achat.qty) }).eq("id", achat.produit_id);
        await stockMvt(achat.produit_id, -achat.qty, "achat", `Annulation achat ×${achat.qty}`);
      }
    }
    await ML.logAction("Suppression achat");
    toast("Supprimé", "ok"); loadAchats();
  });

  load().catch((e)=>{ console.error(e); toast("Erreur de chargement", "ko"); });
</script>
</body></html>
