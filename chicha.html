<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicha — Medellin Lounge</title>
<link rel="stylesheet" href="shared.css">
<style>
  .so .d { font-size:12px; color:var(--muted); }
  .twoin { display:grid; grid-template-columns:2fr 1fr; gap:0 12px; }
  .lock-banner { background:rgba(232,85,78,.12); border:1px solid var(--ko); color:var(--ko);
                 padding:10px 14px; border-radius:10px; font-weight:600; margin-bottom:14px; }
  .info { background:rgba(224,161,58,.10); border:1px solid var(--warn); color:var(--warn);
          padding:8px 12px; border-radius:8px; font-size:13px; margin-bottom:12px; }
  .cnt-row { display:grid; grid-template-columns:1fr auto auto; gap:8px; align-items:center;
             padding:9px 0; border-bottom:1px solid var(--line); }
  .cnt-row .d { font-size:12px; color:var(--muted); }
  .cnt-badge { text-align:center; min-width:54px; }
  .cnt-badge .d { margin-bottom:2px; }
  .type-row { display:flex; gap:0; border-radius:10px; overflow:hidden; border:1px solid var(--line); margin-bottom:12px; }
  .tt-btn { flex:1; padding:9px; border:none; background:var(--surface); color:var(--muted); font-weight:600; cursor:pointer; font-size:14px; transition:.15s; }
  .tt-btn.active { background:var(--gold); color:#1a1000; }
  .so { display:grid; grid-template-columns:1fr auto auto auto auto; gap:8px; align-items:center;
        padding:10px 0; border-bottom:1px solid var(--line); }
</style>
</head><body>
<div id="toast"></div>

<main>
  <h1>Sorties chicha</h1>
  <div class="ml-sub" id="sub"></div>
  <div class="info">📦 Inventaire stock uniquement — n'entre jamais dans les calculs financiers.</div>
  <div id="lockBanner" class="lock-banner" style="display:none">🔒 Caisse clôturée — saisie fermée</div>

  <div class="card">
    <h2 style="margin-top:0">Comptage machines & arômes</h2>
    <div id="cntHistory"><p class="muted">Chargement…</p></div>
    <div style="border-top:1px solid var(--line);margin:12px 0 14px"></div>
    <div class="twoin">
      <div><label>Chichaman</label>
        <select id="ctEmp"><option value="">Sélectionner…</option></select>
      </div>
      <div><label>Moment</label>
        <select id="ctMoment">
          <option value="ouverture">Ouverture</option>
          <option value="fermeture">Fermeture</option>
        </select>
      </div>
    </div>
    <div class="twoin">
      <div><label>Nb machines</label><input id="ctMachines" type="number" min="0" value="0"></div>
      <div><label>Boîtes d'arôme</label><input id="ctAromes" type="number" min="0" value="0"></div>
    </div>
    <button class="btn mt" id="saveCount">Enregistrer le comptage</button>
  </div>

  <div class="card" id="formCard">
    <h2 style="margin-top:0">Nouvelle sortie</h2>
    <div class="type-row">
      <button type="button" class="tt-btn active" data-t="vente" onclick="setSortieType('vente')">Vente</button>
      <button type="button" class="tt-btn" data-t="cadeau" onclick="setSortieType('cadeau')">🎁 Cadeau client</button>
    </div>
    <div class="twoin">
      <div>
        <label>Arôme</label>
        <input id="cArome" list="aromeList" placeholder="Ex : Pomme, Menthe…">
        <datalist id="aromeList"></datalist>
      </div>
      <div><label>Quantité</label><input id="cQty" type="number" min="1" value="1"></div>
    </div>
    <button class="btn" id="addSortie">Enregistrer la sortie</button>
  </div>

  <div class="card">
    <div class="row between">
      <h2 style="margin:0">Sorties du jour</h2>
      <b class="gold" id="totalQty">0</b>
    </div>
    <div id="list" class="mt">Chargement…</div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="shared.js"></script>
<script>
  document.body.insertAdjacentHTML("afterbegin", HEADER_HTML);
  if (!initPage(["chicha", "manager", "owner"])) throw new Error("non autorisé");

  let sortieType = "vente";
  function setSortieType(t) {
    sortieType = t;
    document.querySelectorAll(".tt-btn").forEach(b => b.classList.toggle("active", b.dataset.t === t));
  }

  const role = ML.getRole();
  const meId = ML.getExtra().employe_id || null;
  const canValidate = role === "manager" || role === "owner";
  const st = { session:null, sorties:[], chichaProds:[], empMap:{}, inventaires:[], chichaEmps:[] };
  function fmtHeure(ts){ if(!ts) return ""; const d=new Date(ts); return d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}); }
  const locked = () => !st.session || st.session.statut !== "ouvert";

  async function ensureSession(){
    let { data, error } = await db.from("sessions_caisse").insert({ date: todayISO() }).select().single();
    if (error && error.code === "23505") {
      ({ data } = await db.from("sessions_caisse").select("*").eq("date", todayISO()).maybeSingle());
      if (!data) throw new Error("Session introuvable après conflit d'insertion");
    } else if (error) throw error;
    return data;
  }

  async function load(){
    st.session = await ensureSession();
    const [{ data:prods }, { data:emps }] = await Promise.all([
      db.from("produits").select("id,nom,stock_actuel").eq("type","chicha").not("actif","is",false).order("nom"),
      db.from("employes").select("id,prenom,nom,role"),
    ]);
    st.chichaProds = prods || [];
    (emps||[]).forEach(e=>st.empMap[e.id]=((e.prenom?e.prenom+" ":"")+(e.nom||"")).trim());
    st.chichaEmps = (emps||[]).filter(e=>e.role==="chicha");
    const ctEmpEl = $("ctEmp");
    ctEmpEl.innerHTML = `<option value="">Sélectionner…</option>`
      + st.chichaEmps.map(e=>`<option value="${escHtml(e.id)}">${escHtml(st.empMap[e.id]||"")}</option>`).join("");
    if (meId && st.chichaEmps.find(e=>e.id===meId)) ctEmpEl.value = meId;
    // pré-sélectionner moment selon l'heure
    $("ctMoment").value = new Date().getHours() < 14 ? "ouverture" : "fermeture";
    $("aromeList").innerHTML = st.chichaProds.map(p=>`<option value="${escHtml(p.nom)}">`).join("");
    $("sub").textContent = frDate(todayISO()) + " · " + (locked() ? "caisse clôturée" : "caisse ouverte");
    $("lockBanner").style.display = locked() ? "" : "none";
    if (locked()) document.querySelectorAll("#formCard input, #formCard button").forEach(el=>el.disabled=true);
    await Promise.all([loadSorties(), loadComptage()]);
  }

  async function loadComptage(){
    const { data } = await db.from("inventaire_chicha").select("*").eq("date", todayISO()).order("created_at");
    st.inventaires = data || [];
    const el = $("cntHistory");
    if (!st.inventaires.length){ el.innerHTML = `<p class="muted">Aucun comptage enregistré aujourd'hui.</p>`; return; }
    el.innerHTML = st.inventaires.map(inv=>`
      <div class="cnt-row">
        <div>
          <div style="font-weight:600">${escHtml(st.empMap[inv.employe_id]||"—")}</div>
          <div class="d">${inv.moment==="ouverture"?"🌅 Ouverture":"🌙 Fermeture"} · ${escHtml(fmtHeure(inv.created_at))}</div>
        </div>
        <div class="cnt-badge"><div class="d">Machines</div><b>${inv.nb_machines}</b></div>
        <div class="cnt-badge"><div class="d">Arômes</div><b>${inv.nb_aromes}</b></div>
      </div>`).join("");
  }

  async function loadSorties(){
    const { data } = await db.from("sorties_chicha").select("*").eq("session_id", st.session.id).order("created_at");
    st.sorties = data || [];
    $("totalQty").textContent = st.sorties.reduce((a,s)=>a+(s.qty||0),0) + " chicha";
    const el = $("list");
    if (!st.sorties.length){ el.innerHTML = `<p class="muted">Aucune sortie enregistrée.</p>`; return; }
    el.innerHTML = st.sorties.map(s=>{
      const isCadeau = s.type === "cadeau";
      return `<div class="so" data-id="${escHtml(s.id)}">
        <div><div style="font-weight:600">${escHtml(s.arome || "—")} ×${s.qty}</div>
          <div class="d">${escHtml(st.empMap[s.employe_id] || "")}</div></div>
        ${isCadeau
          ? `<span class="tag" style="background:rgba(224,161,58,.2);color:var(--gold);font-weight:700">🎁 Cadeau</span>`
          : `<span class="tag ${s.valide ? "tag-ok" : "tag-muted"}">${s.valide ? "Validé" : "En attente"}</span>`}
        ${canValidate && !locked() && !isCadeau ? `<button class="btn btn-sm btn-ghost s-val">${s.valide ? "Dévalider" : "Valider"}</button>` : "<span></span>"}
        ${locked() ? "<span></span>" : `<button class="btn btn-sm btn-ghost s-del">✕</button>`}
      </div>`;
    }).join("");
  }

  $("saveCount").addEventListener("click", async ()=>{
    const empId = $("ctEmp").value;
    if (!empId){ toast("Sélectionne le chichaman", "ko"); return; }
    const moment = $("ctMoment").value;
    const nb_machines = Math.round(Number($("ctMachines").value)||0);
    const nb_aromes   = Math.round(Number($("ctAromes").value)||0);
    const { error } = await db.from("inventaire_chicha").insert({
      date: todayISO(), moment, employe_id: empId, nb_machines, nb_aromes,
    });
    if (error){ toast("Erreur", "ko"); console.error(error); return; }
    await ML.logAction(`Comptage chicha ${moment} — ${st.empMap[empId]||""} : ${nb_machines} machines, ${nb_aromes} arômes`);
    toast("Comptage enregistré", "ok");
    loadComptage();
  });

  $("addSortie").addEventListener("click", async ()=>{
    if (locked()) return;
    const arome = $("cArome").value.trim();
    const qty = Math.max(1, Math.round(Number($("cQty").value) || 1));
    const type = sortieType;
    if (!arome){ toast("Indique l'arôme", "ko"); return; }
    const { error } = await db.from("sorties_chicha").insert({
      session_id: st.session.id, employe_id: meId, arome, qty, valide: false, type,
    });
    if (error){ toast("Erreur", "ko"); console.error(error); return; }
    // Décrément du stock chicha si l'arôme correspond à un produit
    const prod = st.chichaProds.find(p=>p.nom.toLowerCase() === arome.toLowerCase());
    if (prod){
      const nv = (Number(prod.stock_actuel)||0) - qty;
      await db.from("produits").update({ stock_actuel: nv }).eq("id", prod.id);
      prod.stock_actuel = nv;
      await stockMvt(prod.id, -qty, type === "cadeau" ? "cadeau" : "chicha",
        `${type === "cadeau" ? "Cadeau client" : "Sortie chicha"} ${arome} ×${qty}`);
    }
    await ML.logAction(`${type === "cadeau" ? "Cadeau client" : "Sortie chicha"} ${arome} ×${qty}`);
    $("cArome").value = ""; $("cQty").value = 1;
    setSortieType("vente");
    toast(type === "cadeau" ? "Cadeau enregistré 🎁" : "Sortie enregistrée", "ok");
    loadSorties();
  });

  $("list").addEventListener("click", async (ev)=>{
    const row = ev.target.closest(".so"); if(!row) return; const id = row.dataset.id;
    if (ev.target.closest(".s-del")){
      if (!confirm("Supprimer cette sortie ?")) return;
      const sortie = st.sorties.find(s=>s.id===id);
      const { error } = await db.from("sorties_chicha").delete().eq("id", id);
      if (error){ toast("Erreur", "ko"); return; }
      if (sortie?.arome && sortie?.qty){
        const prod = st.chichaProds.find(p=>p.nom.toLowerCase()===sortie.arome.toLowerCase());
        if (prod){
          const nv = (Number(prod.stock_actuel)||0) + sortie.qty;
          await db.from("produits").update({ stock_actuel: nv }).eq("id", prod.id);
          prod.stock_actuel = nv;
          await stockMvt(prod.id, sortie.qty, "chicha", `Annulation sortie chicha ${sortie.arome} ×${sortie.qty}`);
        }
      }
      await ML.logAction("Suppression sortie chicha"); toast("Supprimé", "ok"); loadSorties();
    } else if (ev.target.closest(".s-val")){
      const cur = st.sorties.find(s=>s.id===id);
      const { error } = await db.from("sorties_chicha").update({ valide: !cur.valide }).eq("id", id);
      if (error){ toast("Erreur", "ko"); return; }
      await ML.logAction("Validation sortie chicha"); loadSorties();
    }
  });

  load().catch((e)=>{ console.error(e); toast("Erreur de chargement", "ko"); });
</script>
</body></html>
