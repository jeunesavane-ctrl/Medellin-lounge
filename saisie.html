<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventes — Medellin Lounge</title>
<link rel="stylesheet" href="shared.css">
<style>
  .tables-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:10px; }
  .tbl {
    aspect-ratio:1/1; border-radius:14px; border:1px solid var(--line); background:var(--surface);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    cursor:pointer; padding:6px; text-align:center;
  }
  .tbl .lab { font-size:20px; font-weight:800; }
  .tbl .who { font-size:11px; color:var(--muted); }
  .tbl.mine   { border:2px solid var(--gold); background:rgba(201,162,74,.10); }
  .tbl.other  { border:1px solid var(--gold); }
  .tbl.locked { opacity:.5; cursor:not-allowed; }
  .lock-banner { background:rgba(232,85,78,.12); border:1px solid var(--ko); color:var(--ko);
                 padding:10px 14px; border-radius:10px; font-weight:600; margin-bottom:14px; }
  .prod-pick { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px; }
  .pp { border:1px solid var(--line); background:var(--surface-2); border-radius:10px; padding:10px;
        cursor:pointer; }
  .pp.sel { border-color:var(--gold); background:rgba(201,162,74,.12); }
  .pp .pn { font-weight:700; } .pp .pr { font-size:12px; color:var(--gold); }
  .pay-opts { display:flex; gap:8px; }
  .pay-opts .po { flex:1; text-align:center; padding:10px; border:1px solid var(--line);
                  border-radius:10px; cursor:pointer; font-weight:600; }
  .pay-opts .po.sel { border-color:var(--gold); background:rgba(201,162,74,.12); color:var(--gold); }
  .vrow { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--line); font-size:14px; }
</style>
</head><body>
<div id="toast"></div>

<main>
  <h1>Ventes</h1>
  <div class="ml-sub" id="sub"></div>
  <div id="lockBanner" class="lock-banner" style="display:none">🔒 Caisse clôturée — lecture seule</div>

  <!-- Vue grille des tables -->
  <div id="viewGrid">
    <div class="card">
      <h2 style="margin-top:0">Choisir une table</h2>
      <div class="tables-grid" id="tablesGrid">Chargement…</div>
    </div>
  </div>

  <!-- Vue vente sur une table -->
  <div id="viewVente" style="display:none">
    <div class="card">
      <div class="row between">
        <h2 style="margin:0">Table <span id="vTable" class="gold"></span></h2>
        <button class="btn btn-ghost btn-sm" id="backGrid">← Tables</button>
      </div>

      <h3>Produit</h3>
      <div class="prod-pick" id="prodPick"></div>

      <div class="grid grid-2 mt">
        <div><label>Quantité</label><input id="vQty" type="number" min="1" value="1"></div>
        <div><label>&nbsp;</label><div id="vTotal" class="gold" style="font-size:20px;font-weight:800;padding-top:6px">—</div></div>
      </div>

      <label>Paiement</label>
      <div class="pay-opts" id="payOpts">
        <div class="po sel" data-p="especes">Espèces</div>
        <div class="po" data-p="om">Orange Money</div>
      </div>

      <button class="btn mt" id="addVente">Enregistrer la vente</button>
    </div>

    <div class="card">
      <h2 style="margin-top:0">Ventes sur cette table</h2>
      <div id="tableVentes">—</div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="shared.js"></script>
<script>
  document.body.insertAdjacentHTML("afterbegin", HEADER_HTML);
  if (!initPage(["staff"])) throw new Error("non autorisé");

  const meId = ML.getExtra().employe_id;
  const st = { session:null, tables:[], produits:[], empMap:{}, ventes:[], curTable:null, selProd:null, selPay:"especes", sub:null };

  function locked(){ return !st.session || st.session.statut !== "ouvert"; }

  async function ensureSession(){
    let { data, error } = await db.from("sessions_caisse").insert({ date: todayISO() }).select().single();
    if (error && error.code === "23505") {
      ({ data } = await db.from("sessions_caisse").select("*").eq("date", todayISO()).maybeSingle());
      if (!data) throw new Error("Session introuvable après conflit d'insertion");
    } else if (error) { throw error; }
    return data;
  }

  async function loadAll(){
    st.session = await ensureSession();
    const [{ data:tables }, { data:produits }, { data:emps }] = await Promise.all([
      db.from("tables_lounge").select("*").not("actif","is",false).order("ordre"),
      db.from("produits").select("*").not("actif","is",false).order("type").order("nom"),
      db.from("employes").select("id,prenom,nom"),
    ]);
    st.tables = tables||[]; st.produits = produits||[];
    st.empMap = {}; (emps||[]).forEach(e=>st.empMap[e.id]=(e.prenom||e.nom||"").trim());
    await loadVentes();
    $("sub").textContent = frDate(todayISO()) + " · Caisse : " + (st.session.statut==="ouvert"?"ouverte":"clôturée");
    $("lockBanner").style.display = locked() ? "" : "none";
    renderGrid();
  }

  async function loadVentes(){
    const { data } = await db.from("ventes_session").select("*").eq("session_id", st.session.id);
    st.ventes = data||[];
  }

  function tblState(t){
    if (locked()) return "locked";
    if (t.ouverte_par === meId) return "mine";
    if (t.ouverte_par) return "other";
    return "free";
  }

  function renderGrid(){
    const el = $("tablesGrid");
    if (!st.tables.length){ el.innerHTML = `<p class="muted">Aucune table active. Demande à l'owner d'en créer (Paramètres).</p>`; return; }
    el.innerHTML = st.tables.map(t=>{
      const stt = tblState(t);
      const who = t.ouverte_par ? (stt==="mine" ? "moi" : escHtml(st.empMap[t.ouverte_par]||"…")) : "libre";
      const cls = stt==="mine"?"mine":stt==="other"?"other":stt==="locked"?"locked":"";
      return `<div class="tbl ${cls}" data-label="${escHtml(t.label)}">
                <div class="lab">${escHtml(t.label)}</div>
                <div class="who">${who}</div>
              </div>`;
    }).join("");
  }

  // --- Sélection d'une table ---
  $("tablesGrid").addEventListener("click",(ev)=>{
    const c = ev.target.closest(".tbl"); if(!c) return;
    if (locked()){ toast("Caisse clôturée","ko"); return; }
    st.curTable = st.tables.find(t=>t.label===c.dataset.label);
    st.selProd = null; st.selPay = "especes";
    openVente();
  });
  $("backGrid").addEventListener("click",()=>{ $("viewVente").style.display="none"; $("viewGrid").style.display=""; renderGrid(); });

  function openVente(){
    $("viewGrid").style.display="none"; $("viewVente").style.display="";
    $("vTable").textContent = st.curTable.label;
    $("vQty").value = 1;
    $("payOpts").querySelectorAll(".po").forEach(p=>p.classList.toggle("sel",p.dataset.p==="especes"));
    renderProdPick(); renderTotal(); renderTableVentes();
  }

  function renderProdPick(){
    $("prodPick").innerHTML = st.produits.map(p=>`
      <div class="pp${st.selProd&&st.selProd.id===p.id?" sel":""}" data-id="${escHtml(p.id)}">
        <div class="pn">${escHtml(p.nom)}</div><div class="pr">${gnf(p.prix_defaut||0)}</div>
      </div>`).join("") || `<p class="muted">Aucun produit. (Paramètres → Produits)</p>`;
  }
  $("prodPick").addEventListener("click",(ev)=>{
    const c = ev.target.closest(".pp"); if(!c) return;
    st.selProd = st.produits.find(p=>p.id===c.dataset.id);
    renderProdPick(); renderTotal();
  });

  $("payOpts").addEventListener("click",(ev)=>{
    const c = ev.target.closest(".po"); if(!c) return;
    st.selPay = c.dataset.p;
    $("payOpts").querySelectorAll(".po").forEach(p=>p.classList.toggle("sel",p===c));
  });

  $("vQty").addEventListener("input", renderTotal);
  function renderTotal(){
    const q = Math.max(1, Number($("vQty").value)||1);
    $("vTotal").textContent = st.selProd ? gnf((st.selProd.prix_defaut||0)*q) : "—";
  }

  function renderTableVentes(){
    const list = st.ventes.filter(v=>v.table_label===st.curTable.label);
    const el = $("tableVentes");
    if(!list.length){ el.innerHTML = `<p class="muted">Aucune vente sur cette table.</p>`; return; }
    const tot = list.reduce((a,v)=>a+(v.total||0),0);
    el.innerHTML = list.map(v=>`
      <div class="vrow"><span>${escHtml(v.produit_nom)} ×${v.qty} <span class="muted">(${v.paiement})</span> ${v.employe_id===meId?"":'<span class="tag tag-muted">autre</span>'}</span><b>${gnf(v.total)}</b></div>`
    ).join("") + `<div class="vrow" style="border:none"><b>Total table</b><b class="gold">${gnf(tot)}</b></div>`;
  }

  // --- Enregistrer une vente ---
  let saving = false;
  $("addVente").addEventListener("click", async ()=>{
    if (saving) return;
    if (locked()){ toast("Caisse clôturée","ko"); return; }
    if (!st.selProd){ toast("Choisis un produit","ko"); return; }
    const qty = Math.max(1, Math.round(Number($("vQty").value)||1));
    const prix = st.selProd.prix_defaut||0;
    const total = prix*qty;
    if ((Number(st.selProd.stock_actuel)||0) < qty){ toast("Stock insuffisant pour cette quantité","ko"); return; }
    saving = true; $("addVente").disabled = true;
    try {
      const { error } = await db.from("ventes_session").insert({
        session_id: st.session.id, employe_id: meId,
        produit_id: st.selProd.id, produit_nom: st.selProd.nom,
        qty, prix_unitaire: prix, total, paiement: st.selPay,
        table_label: st.curTable.label,
      });
      if (error) throw error;

      // Ouverture table si libre (ouverte_par IS NULL)
      if (!st.curTable.ouverte_par){
        const { data:td } = await db.from("tables_lounge").select("ouverte_par").eq("label", st.curTable.label).single();
        if (td && !td.ouverte_par){
          await db.from("tables_lounge").update({ ouverte_par: meId }).eq("label", st.curTable.label);
          st.curTable.ouverte_par = meId;
        }
      }
      // Décrément du stock (inventaire)
      await db.from("produits").update({ stock_actuel: (Number(st.selProd.stock_actuel)||0) - qty }).eq("id", st.selProd.id);
      st.selProd.stock_actuel = (Number(st.selProd.stock_actuel)||0) - qty;

      await ML.logAction(`Vente ${st.selProd.nom} ×${qty} (${st.selPay}) sur ${st.curTable.label}`);
      await loadVentes();
      renderTableVentes();
      toast("Vente enregistrée", "ok");
    } catch(e){
      console.error(e); toast("Erreur d'enregistrement", "ko");
    } finally {
      saving = false; $("addVente").disabled = false;
    }
  });

  // --- Realtime : verrou si la caisse clôture ---
  function subscribe(){
    st.sub = db.channel("saisie")
      .on("postgres_changes",{event:"*",schema:"public",table:"sessions_caisse"}, (payload)=>{
        if (payload.new && payload.new.date === todayISO()){
          st.session = payload.new;
          $("lockBanner").style.display = locked() ? "" : "none";
          $("sub").textContent = frDate(todayISO()) + " · Caisse : " + (locked()?"clôturée":"ouverte");
          if (locked() && $("viewVente").style.display!=="none"){ $("addVente").disabled = true; }
          renderGrid();
        }
      }).subscribe();
  }
  window.addEventListener("beforeunload",()=>{ if(st.sub) db.removeChannel(st.sub); });

  loadAll().then(subscribe).catch((e)=>{ console.error(e); toast("Erreur de chargement","ko"); });
</script>
</body></html>
